<!doctype html>
<!--
  GitHub Pages serves this file for any path it can't find as a static
  file. Because this is a Vite SPA using BrowserRouter, deep links
  (e.g., /about) would otherwise hit this 404. The inline script
  below redirects to the root index, preserving the path + query
  in a single ?p= param so the React app can restore the route on
  arrival.

  Pair with the matching unpack snippet in index.html's <head>.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/mokshly-website/" />
    <script>
      // Keep this in sync with `base` in vite.config.ts. The leading
      // slash + trailing slash form is required so we can both strip
      // the base from the request path and reconstruct the redirect
      // target correctly.
      var BASE = '/mokshly-website/';
      (function () {
        var l = window.location;
        var path = l.pathname.indexOf(BASE) === 0
          ? l.pathname.slice(BASE.length)
          : l.pathname.replace(/^\//, '');
        var rest = path + (l.search ? '?' + l.search.slice(1) : '');
        l.replace(
          l.origin + BASE + '?p=' + encodeURIComponent(rest) +
          (l.hash || '')
        );
      })();
    </script>
  </head>
  <body></body>
</html>
