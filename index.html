<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F2E2A" />
    <title>Mokshly — Human Capability Infrastructure for the AI Era</title>
    <meta name="description" content="Mokshly is a Human Sustainability Company. We strengthen the people who power your enterprise — embedded daily, built to endure." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mokshly — Human Capability Infrastructure for the AI Era" />
    <meta property="og:description" content="Mokshly is a Human Sustainability Company. We strengthen the people who power your enterprise — embedded daily, built to endure." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Restore SPA path after the public/404.html bounce so deep
         links served by GitHub Pages land on the correct route. -->
    <script>
      // Pair with public/404.html — recover the original deep-link
      // path that GH Pages couldn't serve directly. Keep BASE in sync
      // with `base` in vite.config.ts.
      (function () {
        var BASE = '/mokshly-website/';
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          window.history.replaceState(
            null,
            '',
            BASE + p + window.location.hash,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
