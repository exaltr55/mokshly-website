name: Build and deploy to GitHub Pages

# Triggers:
#   - push to main         → auto build + deploy (typical edit-and-publish flow)
#   - workflow_dispatch    → manual run from the Actions tab (for first run /
#                            re-deploys without a new commit)
#
# Requires the repository's Pages settings to have
#     Source: GitHub Actions
# (Settings → Pages → Build and deployment → Source)
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions needed by actions/deploy-pages@v4.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; in-flight runs are not cancelled so a
# successful deploy can complete even if a newer commit lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
